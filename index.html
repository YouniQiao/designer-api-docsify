<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OH API Reference</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
    }
    .container { max-width: 500px; padding: 40px 20px; }
    h1 { font-size: 32px; margin-bottom: 10px; color: #6c8cff; }
    p { font-size: 16px; color: #999; margin-bottom: 40px; }
    .links { display: flex; gap: 20px; justify-content: center; }
    .btn {
      display: block; padding: 16px 40px;
      background: #16213e; border: 1px solid #6c8cff;
      color: #6c8cff; text-decoration: none; border-radius: 8px;
      font-size: 18px; transition: all 0.2s;
    }
    .btn:hover { background: #6c8cff; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OH API Reference</h1>
    <p>HarmonyOS API Reference Documentation</p>
    <div class="links">
      <a class="btn" href="/docs/en/">English</a>
      <a class="btn" href="/docs/zh-CN/">中文</a>
    </div>
  </div>
</body>
</html>
