<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OH API 参考</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/dark.css">
  <style>
    .sidebar-nav { font-size: 12px; }
    .kit-loaded { margin: 4px 0 0 12px; }
    .tree-section { margin-bottom: 8px; }
    .tree-section details { margin: 0; }
    .tree-section-label {
      display: block; margin: 4px 0 2px 0;
      font-size: 12px; font-weight: 600; color: #6c8cff;
      cursor: pointer; list-style: none;
    }
    .tree-section-label::-webkit-details-marker { display: none; }
    .tree-section-label::marker { display: none; content: ''; }
    .tree-count { font-weight: 400; color: #777; font-size: 11px; }
    .tree-l1 { list-style: none; padding: 0; margin: 0; }
    .tree-l1 > li { padding: 2px 0; }
    .tree-l1 > li > a { color: #ccc; font-size: 12px; text-decoration: none; }
    .tree-l1 > li > a:hover { color: #6c8cff; }
    .tree-l1 details { margin: 0; }
    .tree-l1 summary { cursor: pointer; list-style: none; color: #ccc; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .tree-l1 summary:hover { color: #6c8cff; }
    .tree-l1 summary::-webkit-details-marker { display: none; }
    .tree-l1 summary::marker { display: none; content: ''; }
    .tree-nav { color: #555; text-decoration: none; font-size: 10px; margin-left: 2px; }
    .tree-nav:hover { color: #6c8cff; }
    .tree-l2 { list-style: none; padding: 0 0 0 14px; margin: 0 0 0 5px; border-left: 1px solid #3a3a3a; }
    .tree-l2 > li { padding: 1px 0; }
    .tree-l2 > li > a { color: #aaa; font-size: 11px; text-decoration: none; }
    .tree-l2 > li > a:hover { color: #6c8cff; }
    .tree-l2 details { margin: 0; }
    .tree-l2 summary { cursor: pointer; list-style: none; color: #aaa; font-size: 11px; }
    .tree-l2 summary:hover { color: #6c8cff; }
    .tree-l2 summary::-webkit-details-marker { display: none; }
    .tree-l2 summary::marker { display: none; content: ''; }
    .tree-l3 { list-style: none; padding: 0 0 0 14px; margin: 0 0 0 5px; border-left: 1px solid #333; }
    .tree-l3 > li { padding: 1px 0; }
    .tree-l3 > li > a { color: #999; font-size: 10px; text-decoration: none; }
    .tree-l3 > li > a:hover { color: #6c8cff; }
    .tree-l3 details { margin: 0; }
    .tree-l3 summary { cursor: pointer; list-style: none; color: #999; font-size: 10px; }
    .tree-l3 summary:hover { color: #6c8cff; }
    .tree-l3 summary::-webkit-details-marker { display: none; }
    .tree-l3 summary::marker { display: none; content: ''; }
    .tree-l4 { list-style: none; padding: 0 0 0 14px; margin: 0 0 0 5px; border-left: 1px solid #2a2a2a; }
    .tree-l4 > li { padding: 0; }
    .tree-l4 > li > a { color: #888; font-size: 10px; text-decoration: none; }
    .tree-l4 > li > a:hover { color: #6c8cff; }
    .tree-current { font-weight: 700; color: #6c8cff !important; background: rgba(108,140,255,0.10); border-radius: 3px; padding: 1px 4px; margin-left: -4px; }
    .tree-current.tree-nav { font-weight: 700; color: #6c8cff !important; }
    /* Right-side TOC */
    .app-sub-sidebar { border-left: 1px solid #333; padding-left: 12px; }
    .app-sub-sidebar li { font-size: 12px; line-height: 1.8; }
    .app-sub-sidebar li a { color: #999; text-decoration: none; }
    .app-sub-sidebar li a:hover { color: #6c8cff; }
    .app-sub-sidebar li.active > a { color: #6c8cff; font-weight: 600; }
    .app-sub-sidebar .app-sub-sidebar { border-left: none; padding-left: 8px; }
    .app-sub-sidebar .app-sub-sidebar li { font-size: 11px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'OH API 参考', nameLink: '#/',
      loadSidebar: 'zh-CN/_sidebar.md', basePath: '/',
      subMaxLevel: 3, auto2top: true,
      search: { maxAge: 86400000, paths: 'auto', placeholder: '搜索...', noData: '无结果', depth: 6 },
      themeColor: '#6c8cff',
      plugins: [
        function(hook) {
          var activeKit = null, loadingKit = null;

          function injectKitSidebar(kit) {
            if (loadingKit === kit) return;
            loadingKit = kit;
            var existing = document.querySelector('.kit-loaded');
            if (kit === activeKit && existing) { expandPathToCurrent(); return; }
            if (existing && kit !== activeKit) existing.remove();
            if (!kit) { activeKit = null; loadingKit = null; return; }
            var items = document.querySelectorAll('.sidebar-nav > ul > li');
            var targetLi = null;
            items.forEach(function(li) {
              var a = li.querySelector('a');
              if (a && a.href && a.href.indexOf('/apis-' + kit + '/') !== -1) targetLi = li;
            });
            if (!targetLi) { loadingKit = null; return; }
            var div = document.createElement('div');
            div.className = 'kit-loaded'; div.textContent = '加载中...';
            targetLi.appendChild(div);
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '_sidebars/' + kit + '.html');
            xhr.onload = function() {
              if (xhr.status === 200) {
                div.innerHTML = xhr.responseText;
                activeKit = kit;
                expandPathToCurrent();
              } else { div.textContent = ''; }
              loadingKit = null;
            };
            xhr.onerror = function() { div.textContent = ''; loadingKit = null; };
            xhr.send();
          }

          function detectKit() {
            var hash = window.location.hash;
            if (!hash || !hash.startsWith('#/')) { injectKitSidebar(null); return; }
            var parts = hash.substring(2).split('/');
            var refIdx = parts.indexOf('reference');
            if (refIdx === -1) { injectKitSidebar(null); return; }
            var apiDir = parts[refIdx + 1];
            if (!apiDir || !apiDir.startsWith('apis-')) { injectKitSidebar(null); return; }
            injectKitSidebar(apiDir.replace('apis-', ''));
          }

          function expandPathToCurrent() {
            var hash = window.location.hash;
            if (!hash || !hash.startsWith('#/')) return;
            var p = hash.substring(2).split('?')[0];
            // Clear previous highlight
            var prev = document.querySelector('.tree-current');
            if (prev) prev.classList.remove('tree-current');
            // Find the link (prefer text links over nav arrows)
            var link = document.querySelector('.kit-loaded a:not(.tree-nav)[href="#/' + p + '"]')
                    || document.querySelector('.kit-loaded a:not(.tree-nav)[href="#/' + p + '.md"]')
                    || document.querySelector('.kit-loaded a[href="#/' + p + '"]')
                    || document.querySelector('.kit-loaded a[href="#/' + p + '.md"]');
            if (!link) return;
            // Highlight the row: if link is a tree-nav, highlight its parent <summary>;
            // otherwise highlight the link itself
            var target = link.classList.contains('tree-nav') ? link.closest('summary') : link;
            target.classList.add('tree-current');
            // Expand parent details
            var el = link.closest('details');
            while (el) {
              el.open = true;
              el = el.parentElement.closest('details');
            }
            // Scroll into view
            setTimeout(function() { target.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }, 100);
          }

          function fixLinks() {
            var hash = window.location.hash;
            if (!hash || !hash.startsWith('#/')) return;
            var p = hash.substring(2).split('?')[0];
            var dir = p.substring(0, p.lastIndexOf('/'));
            if (!dir) return;
            document.querySelectorAll('.markdown-section a').forEach(function(a) {
              var h = a.getAttribute('href');
              if (!h || !h.startsWith('#/') || h.startsWith('#/http')) return;
              var cp = h.substring(2).split('?')[0];
              if (cp.indexOf('/') === -1) a.setAttribute('href', '#/' + dir + '/' + h.substring(2));
            });
          }

          hook.ready(function() { fixLinks(); detectKit(); });
          hook.doneEach(function() { fixLinks(); detectKit(); });
        }
      ],
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
