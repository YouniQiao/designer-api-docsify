<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OH API Reference</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/dark.css">
  <style>
    .sidebar-nav { font-size: 12px; }
    .sidebar-nav li { line-height: 1.3; }
    .sidebar-nav ul ul { padding-left: 8px; }
    .app-nav { margin-top: 10px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'OH API Reference',
      nameLink: '#/',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results',
        depth: 6,
      },
      themeColor: '#6c8cff',
      plugins: [
        function(hook, vm) {
          function fixLinks() {
            var hash = window.location.hash;
            if (!hash || !hash.startsWith('#/')) return;
            var routePath = hash.substring(2).split('?')[0];
            var dir = routePath.substring(0, routePath.lastIndexOf('/'));
            if (!dir) return;
            document.querySelectorAll('.markdown-section a').forEach(function(a) {
              var href = a.getAttribute('href');
              if (!href || !href.startsWith('#/') || href.startsWith('#/http')) return;
              var path = href.substring(2).split('?')[0];
              if (path.indexOf('/') === -1) {
                a.setAttribute('href', '#/' + dir + '/' + href.substring(2));
              }
            });
          }
          hook.ready(fixLinks);
          hook.doneEach(fixLinks);
        }
      ],
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</head>
</html>
